[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "npm install -g pnpm@10",
  "cd /app && pnpm install --frozen-lockfile"
]

[phases.build]
cmds = ["cd /app && pnpm --filter @workspace/smm-panel run build"]

[start]
cmd = "npx serve artifacts/smm-panel/dist/public --single -l $PORT"
