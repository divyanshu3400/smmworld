name: Manual Lockfile Update

on:
  workflow_dispatch: # This allows you to trigger it manually from the UI

jobs:
  update-lockfile:
    runs-on: ubuntu-latest
    steps:
      # 1. Check out the repository code
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Install PNPM
      - uses: pnpm/action-setup@v4
        with:
          version: 10

      # 3. Set up Node.js
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      # 4. Run the target command
      - name: Regenerate Lockfile
        run: pnpm install --no-frozen-lockfile

      # 5. Commit the updated pnpm-lock.yaml back to your branch
      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update pnpm-lock.yaml via GitHub Actions"
          file_pattern: 'pnpm-lock.yaml'
